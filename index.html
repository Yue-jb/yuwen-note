<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语文笔记生成器 - 爬虫AI版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .search-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .input-group input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
        }
        
        .input-group button {
            padding: 15px 30px;
            font-size: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .loading {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            display: none;
        }
        
        .result-header {
            background: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .copy-btn {
            padding: 8px 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .note-content {
            padding: 30px;
            line-height: 1.8;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .error-card {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        
        .token-status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
        }
        
        .token-ok {
            background: #d4edda;
            color: #155724;
        }
        
        .token-missing {
            background: #fff3cd;
            color: #856404;
        }
        
        .progress-info {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕷️ 语文笔记生成器 · AI智能版</h1>
            <p>爬取 hanchacha.com + DeepSeek AI 生成完整笔记</p>
        </header>
        
        <div class="search-card">
            <div class="input-group">
                <input type="text" id="lessonName" placeholder="输入课文名称，例如：海底世界" />
                <button onclick="generateNote()">🚀 开始生成</button>
            </div>
            
            <div id="tokenStatus" class="token-status token-missing">
                ⚠️ 正在检测 Token...
            </div>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p id="loadingText">🕷️ 正在触发爬虫...</p>
            <div class="progress-info" id="progressInfo"></div>
        </div>
        
        <div id="resultCard" class="result-card">
            <div class="result-header">
                <h2>📖 AI 生成结果</h2>
                <button class="copy-btn" onclick="copyNote()">📋 复制</button>
            </div>
            <div id="noteContent" class="note-content"></div>
        </div>
        
        <div id="errorCard" class="error-card"></div>
    </div>

    <script>
        const REPO_OWNER = "finnlove";
        const REPO_NAME = "yuwen-note";
        
        // 检查 Token 状态
        function checkTokenStatus() {
            const token = localStorage.getItem('github_token');
            const statusDiv = document.getElementById('tokenStatus');
            if (token && token.startsWith('ghp_')) {
                statusDiv.innerHTML = '✅ GitHub Token 已配置，爬虫功能可用！';
                statusDiv.className = 'token-status token-ok';
                return true;
            } else {
                statusDiv.innerHTML = '⚠️ 未配置 GitHub Token<br>📌 按 F12 打开 Console，输入：localStorage.setItem("github_token", "你的token")';
                statusDiv.className = 'token-status token-missing';
                return false;
            }
        }
        
        async function generateNote() {
            const lessonName = document.getElementById('lessonName').value.trim();
            
            if (!lessonName) {
                alert('请输入课文名称');
                return;
            }
            
            // 清空所有显示
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('errorCard').style.display = 'none';
            document.getElementById('loadingText').innerHTML = '🕷️ 正在触发爬虫...';
            document.getElementById('progressInfo').innerHTML = '';
            
            const token = localStorage.getItem('github_token');
            
            try {
                // 检查 Token
                if (!token || !token.startsWith('ghp_')) {
                    throw new Error('未配置 GitHub Token，无法触发爬虫');
                }
                
                // 触发爬虫
                document.getElementById('loadingText').innerHTML = '📡 正在触发 GitHub Actions 爬虫...';
                const triggered = await triggerWorkflow(lessonName, token);
                
                if (!triggered) {
                    throw new Error('触发爬虫失败，请检查 Token 权限');
                }
                
                // 等待结果
                document.getElementById('loadingText').innerHTML = '🕷️ 爬虫已启动，正在从 hanchacha.com 抓取资料...';
                document.getElementById('progressInfo').innerHTML = '⏱️ 预计需要 30-60 秒，请耐心等待';
                
                const note = await pollForResult(lessonName);
                
                if (note) {
                    document.getElementById('loadingText').innerHTML = '🤖 正在调用 AI 生成笔记...';
                    await new Promise(r => setTimeout(r, 500));
                    displayNote(note);
                    document.getElementById('loading').style.display = 'none';
                } else {
                    throw new Error('爬取超时，未获取到内容');
                }
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorCard').innerHTML = `❌ ${error.message}<br><br>💡 提示：可以在 GitHub Actions 页面手动运行测试`;
                document.getElementById('errorCard').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        async function triggerWorkflow(lessonName, token) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/crawl.yml/dispatches`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: { lesson_name: lessonName }
                    })
                });
                
                if (response.ok) {
                    console.log('✅ 爬虫触发成功');
                    return true;
                } else {
                    const text = await response.text();
                    console.log('❌ 触发失败:', response.status, text);
                    return false;
                }
            } catch (e) {
                console.error('触发失败:', e);
                return false;
            }
        }
        
        async function pollForResult(lessonName, maxAttempts = 25, interval = 3000) {
            for (let i = 0; i < maxAttempts; i++) {
                await new Promise(r => setTimeout(r, interval));
                document.getElementById('progressInfo').innerHTML = `⏱️ 等待中... (${i+1}/${maxAttempts}) 正在处理`;
                
                try {
                    // 直接读取生成的笔记文件
                    const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/data/${encodeURIComponent(lessonName)}.md`;
                    const response = await fetch(url);
                    if (response.ok) {
                        const note = await response.text();
                        // 检查是否是 AI 生成的完整笔记（不是空模板）
                        if (note && note.length > 500) {
                            return note;
                        }
                    }
                } catch(e) {
                    // 文件还不存在，继续等待
                }
            }
            return null;
        }
        
        function displayNote(note) {
            // 简单 Markdown 转 HTML
            let html = note
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>')
                .replace(/^# (.*$)/gm, '<h1 style="font-size: 1.8rem; margin: 20px 0 10px; color: #333;">$1</h1>')
                .replace(/^## (.*$)/gm, '<h2 style="font-size: 1.4rem; margin: 15px 0 10px; color: #555;">$1</h2>')
                .replace(/^### (.*$)/gm, '<h3 style="font-size: 1.2rem; margin: 12px 0 8px; color: #667eea;">$1</h3>')
                .replace(/^---$/gm, '<hr style="margin: 20px 0;">')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^> (.*$)/gm, '<blockquote style="border-left: 4px solid #667eea; padding-left: 15px; margin: 10px 0; color: #666;">$1</blockquote>');
            
            document.getElementById('noteContent').innerHTML = html;
            document.getElementById('resultCard').style.display = 'block';
        }
        
        function copyNote() {
            const text = document.getElementById('noteContent').innerText;
            navigator.clipboard.writeText(text);
            alert('✅ 笔记已复制');
        }
        
        // 回车生成
        document.getElementById('lessonName').addEventListener('keypress', e => {
            if (e.key === 'Enter') generateNote();
        });
        
        // 页面加载检查
        checkTokenStatus();
        console.log('📚 语文笔记生成器已加载（无缓存版本）');
    </script>
</body>
</html>
